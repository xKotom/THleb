<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Тёплый хлеб{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'home' %}" class="navbar__logo">Тёплый хлеб</a>
        {% if user.is_authenticated %}
        <a href="{% url 'profile' %}" class="navbar__profile" title="Аккаунт">
            <span class="navbar__avatar">{{ user.nickname|first|default:"?" }}</span>
        </a>
        {% endif %}
    </nav>

    <main class="content">
        {% if messages %}
        <div class="messages">
            {% for msg in messages %}
            <div class="messages__item messages__item--{{ msg.tags }}">{{ msg }}</div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/main.js"></script>
</body>
</html>
